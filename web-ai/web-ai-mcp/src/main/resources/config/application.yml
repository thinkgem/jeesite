
#======================================#
#========== Project settings ==========#
#======================================#

# 产品或项目名称、软件开发公司名称
productName: JeeSite MCP Server
companyName: ThinkGem

# 产品版本、版权年份
productVersion: V5.16
copyrightYear: 2026

# 是否演示模式
demoMode: false

# 专为分离端提供接口服务
apiMode: false

#======================================#
#========== Server settings ===========#
#======================================#

server:

  port: 8992
#  servlet:
#    context-path: /js
#    register-default-servlet: false
#  tomcat:
#    uri-encoding: UTF-8
#    max-http-form-post-size: 20MB
#
#  # 当 Nginx 为 https，tomcat 为 http 时，设置该选项为 true
#  schemeHttps: false

#======================================#
#========= Database settings ==========#
#======================================#

# 数据库连接
jdbc:

  # Mysql 数据库配置
  type: mysql
  driver: com.mysql.cj.jdbc.Driver
  url: jdbc:mysql://127.0.0.1:3306/jeesite_v5?useSSL=false&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=CONVERT_TO_NULL&serverTimezone=Asia/Shanghai
  username: root
  password: 123456
  testSql: SELECT 1

  # 数据库连接池配置
  pool:

    # 初始化连接数
    init: 1
    # 最小连接数
    minIdle: 3
    # 最大连接数
    maxActive: 20

#======================================#
#========== Framework settings ========#
#======================================#

spring:
  
  # 应用程序名称
  application:
    name: jeesite-web-ai-mcp

  # 环境名称（注意：不可设置为 test 它是单元测试专用的名称）
  profiles:
    active: default

  # 打印横幅
  main:
    banner-mode: "off"
    lazy-initialization: false

#  # MVC 映射匹配策略
#  mvc:
#    pathmatch:
#      matching-strategy: ANT_PATH_MATCHER

  # JTA XA 事务（spring boot 3）
  jta:
    enabled: false

#  # Redis 连接参数 （RedisProperties）
#  data:
#    redis:
#      host: 127.0.0.1
#      port: 6379
#      ssl:
#        enabled: false
#      database: 0
#      password: 1234
#      timeout: 20000
#      lettuce:
#        pool:
#          # 最大空闲连接数
#          maxIdle: 3
#          # 最大活动连接数
#          maxActive: 20
#
#  # 缓存配置
#  cache:
#    # 缓存及会话共享（专业版）
#    isClusterMode: true

  # MPC Server 相关配置
  # https://docs.spring.io/spring-ai/reference/api/mcp/mcp-server-boot-starter-docs.html
  ai:
    mcp:
      server:
        enabled: true
        name: jeesite-mcp-server
        version: 1.0.0
        type: SYNC
#        sse-endpoint: /api/v1/sse
#        sse-message-endpoint: /api/v1/mcp
        protocol: STREAMABLE
        streamable-http:
          mcp-endpoint: /api/v1/mcp
        capabilities:
          tool: true
          resource: true
          prompt: true
          completion: true

# Shiro 相关
shiro:
  # URI 权限过滤器定义（自定义添加参数时，请不要移除 ${adminPath}/** = user，否则会导致权限异常）
  # 提示：填写过滤规则，请注意先后顺序，从上到下，先匹配先受用规则，匹配成功后不再继续匹配。
  filterChainDefinitions: |
    /api/v1/mcp/** = anon
    ${adminPath}/** = user

# 日志配置
logging:
  config: classpath:config/logback-spring.xml

# MyBatis 相关
mybatis:

  # Mapper文件刷新线程
  mapper:
    refresh:
      enabled: false

# 管理基础路径
adminPath: /a

# 前端基础路径
frontPath: /f

# 基础配置（参数、模块、字典）
config:
  enabled: true

# 用户权限相关（用户、角色、菜单）
user:
  enabled: true

# 国际化管理
lang:
  enabled: false

# 任务调度
job:
  enabled: false

# 代码生成
gen:
  enabled: false

# 系统监控（默认开启，可关闭）访问地址如下：
#   服务监控：http://127.0.0.1:8992/js/a/state/server/index
state:
  enabled: true

# 核心功能 Controller 开关
web:
  core:
    enabled: true

# 文件上传
file:
  enabled: false

# 消息提醒中心
msg:
  enabled: false
  
#======================================#
#========== Project settings ==========#
#======================================#
